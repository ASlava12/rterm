name: release

# Tag-triggered multi-platform release pipeline.
#
# Trigger: push a SemVer-shaped tag (e.g. `v0.0.2`, `v1.2.3-rc.1`).
# Run: `git tag v0.0.2 && git push origin v0.0.2`.
#
# What it does:
#   1. On every supported platform, run the lib tests + clippy as a
#      release-quality gate (a tag should never publish on broken
#      master). Then build a `--release` `rterm` binary.
#   2. Package per-platform: tarball on Linux/macOS, zip on Windows,
#      plus a WiX-generated MSI on Windows for double-click install.
#   3. Upload everything to a GitHub Release that softprops/action-
#      gh-release creates (or updates) for the tag. The Release is
#      published as a draft if the tag is a pre-release (`-rc.1`,
#      `-alpha.2`, etc.) — easier to amend before the public push.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            bin: rterm
          # Second x86_64 Linux build on the older runner — links
          # against glibc 2.35 instead of 2.39, so the binary still
          # loads on Ubuntu 22.04 LTS / Debian 12 / RHEL 9 / any
          # distro shipped after early 2022. Field report from a
          # v0.0.5 user: `version `GLIBC_2.39' not found` on a 22.04
          # box, fixed by this leg. Tagged with an `-glibc2.35`
          # suffix so the two archives don't collide and downstream
          # users can grab the right one.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            bin: rterm
            archive_suffix: -glibc2.35
          # GitHub-hosted Linux/ARM64 runner (GA April 2025, free for
          # public repos). Native compile — no `cross` toolchain or
          # qemu emulation needed.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
            bin: rterm
          # x86_64-apple-darwin dropped from the release matrix:
          # GitHub's `macos-13` Intel runner pool degraded to 4+ hour
          # queue times in mid-2026 (Apple Silicon eclipsed Intel
          # Macs years prior). The remaining Intel-Mac user base
          # gets first-class compatibility via Rosetta 2, which
          # transparently runs the `aarch64-apple-darwin` binary.
          # When/if `macos-13` queue health recovers, add the leg
          # back — the build steps below are target-parameterised
          # and don't need any other change.
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            bin: rterm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            bin: rterm.exe
            msi_arch: x86_64
          # Native Windows/ARM64 runner. The MSI step is skipped on
          # this leg — WiX v3's candle/light ship as x86 binaries
          # that only run under emulation on ARM64, and the
          # toolchain isn't reliable enough on the new runner image
          # yet. ARM64 users get the zip; an ARM64 MSI can land in a
          # follow-up once the WiX v4 (native) port stabilises.
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            archive: zip
            bin: rterm.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libssl-dev \
            pkg-config

      - name: Pre-release sanity (clippy + lib tests)
        run: |
          cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings
          cargo test --workspace --lib --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p rterm-app --target ${{ matrix.target }}

      # Tag minus the leading `v` — used as the on-disk version
      # string inside packaged filenames. Set as a step output so
      # later steps can reference it without re-parsing the ref.
      - name: Derive version
        id: ver
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Package (tarball)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          stage="rterm-${{ steps.ver.outputs.tag }}-${{ matrix.target }}${{ matrix.archive_suffix }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$stage/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$stage/" 2>/dev/null || true
          tar -czf "$stage.tar.gz" "$stage"
          echo "ARTIFACT=$stage.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "rterm-${{ steps.ver.outputs.tag }}-${{ matrix.target }}${{ matrix.archive_suffix }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" $stage
          if (Test-Path README.md) { Copy-Item README.md $stage }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ARTIFACT=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Windows-only: package an MSI installer for the double-click
      # install flow. cargo-wix consumes `crates/rterm-app/wix/main.wxs`
      # plus `[package.metadata.wix]` and emits an MSI next to the
      # built binary. Skipped on Linux/macOS (deb / pkg are out of
      # scope today).
      - name: Install cargo-wix
        if: matrix.msi_arch != ''
        run: cargo install cargo-wix --locked

      - name: Build MSI
        if: matrix.msi_arch != ''
        shell: pwsh
        run: |
          $msi = "rterm-${{ steps.ver.outputs.version }}-${{ matrix.msi_arch }}.msi"
          cargo wix --no-build --package rterm-app --target ${{ matrix.target }} `
            --nocapture --output "target/wix/$msi"
          "MSI_ARTIFACT=target/wix/$msi" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}${{ matrix.archive_suffix }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

      - name: Upload MSI
        if: matrix.msi_arch != ''
        uses: actions/upload-artifact@v4
        with:
          name: msi-${{ matrix.target }}
          path: ${{ env.MSI_ARTIFACT }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Mark pre-release tags as drafts so the maintainer can
          # polish the notes before flipping to public.
          draft: ${{ contains(github.ref, '-') }}
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.msi
