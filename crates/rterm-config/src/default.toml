# rterm — auto-generated config (English comments). Generated on first
# run; edit freely. Saved changes hot-reload automatically together with
# init.lua and plugins/*.lua — no restart needed.
#
# To regenerate this file in another language pass `--lang ru` to
# `rterm --print-default-config` and pipe the output back to disk.

# ── [font] ────────────────────────────────────────────────────────────
# Glyph rendering. Hot-reloadable: family / size changes take effect on
# the next config save, no restart.
[font]
# family — exact name of an installed monospace face.
#   Type:   string. Empty `""` lets the renderer auto-pick the system
#           default monospace family (DejaVu Sans Mono on most Linux,
#           Menlo on macOS, Consolas on Windows). Use
#           `rterm --list-fonts` to see what is installed; check a name
#           with `rterm --check`.
#   Default: "" (auto-pick).
family = ""
# size — font size in points.
#   Type:   float. Practical range 6.0..=64.0. Values outside this band
#           render but become illegible (tiny) or eat the window (huge).
#   Default: 13.0.
size = 13.0
# bold_is_bright — apply the xterm-style "bold also brightens" rule.
#   Type:   bool.
#   Default: true. When true, the SGR `bold` attribute remaps the 8 base
#           ANSI colours to their bright variants (matches xterm,
#           iTerm2, kitty). Set false for themes that already encode
#           emphasis via bold without changing the colour palette.
bold_is_bright = true

# ── [window] ──────────────────────────────────────────────────────────
# Initial window geometry + transparency + decorations.
[window]
# width — initial window width in logical pixels.
#   Type:   u32. Reasonable range 320..=8192 (smaller is unreadable,
#           larger usually exceeds the monitor).
#   Default: 1024.
width = 1024
# height — initial window height in logical pixels.
#   Type:   u32. Reasonable range 240..=8192.
#   Default: 640.
height = 640
# opacity — window opacity.
#   Type:   float in 0.0..=1.0 (0 = fully transparent, 1 = opaque).
#           Requires a compositor that honours window transparency
#           (Wayland, macOS, KWin/Mutter, DWM-enabled Windows). Values
#           outside the range are clamped at startup.
#   Default: 1.0.
opacity = 1.0
# os_decorations — let the platform's window manager draw the title bar
# and borders.
#   Type:   bool. When false (the rterm default) the renderer paints its
#           own header strip + tabs + window-control buttons (matches
#           Chrome / Firefox). Set true to fall back to native chrome
#           on tiling WMs or when the in-app drag/resize affordances
#           feel off.
#   Default: false.
os_decorations = false

# ── [shell] ───────────────────────────────────────────────────────────
# What rterm spawns inside every new pane. Leave `program` empty to
# inherit $SHELL on Unix / powershell.exe on Windows.
[shell]
# program — explicit shell binary.
#   Type:   string. Empty `""` falls back to $SHELL / powershell.
#   Default: "".
# program = "/bin/zsh"
# args — extra arguments passed to `program`.
#   Type:   array of strings.
#   Default: [].
# args = ["-l"]
# [shell.env] — extra environment variables for every spawned shell.
# Applied AFTER the built-in TERM / COLORTERM / TERM_PROGRAM defaults so
# user entries win on key collision. Parent env stays intact — this is
# additive, never a replacement.
#   Type:   table of `KEY = "value"`.
# [shell.env]
# RUST_BACKTRACE = "1"
# LANG = "en_US.UTF-8"

# ── [terminal] ────────────────────────────────────────────────────────
# Per-pane terminal behaviour: scrollback, cursor, bells, OSC policy.
[terminal]
# scrollback — number of lines retained in each pane's scrollback ring.
#   Type:   usize. 0 disables scrollback entirely. Each Cell is 20
#           bytes (char + fg/bg colour + attrs + hyperlink id), so
#           memory cost is roughly `scrollback * cols * 20` bytes
#           per pane. 10 000 × 80 cols ≈ 16 MiB. Drop to 2000 if
#           you keep many panes open or hit memory pressure.
#   Default: 10000.
scrollback = 10000
# save_scrollback_on_exit — dump the focused pane's scrollback to
# `$XDG_CACHE_HOME/rterm/scrollback-<ts>.txt` when the window closes
# (same path / format as the `save_scrollback` action).
#   Type:   bool. Default: false.
save_scrollback_on_exit = false
# restore_session — persist (and re-open) the list of tabs across runs.
# One focused-pane cwd is recorded per tab; splits are NOT preserved
# (each restored tab opens as a single pane in the saved cwd).
#   Type:   bool. Default: false.
restore_session = false
# scroll_on_output — snap the view back to live whenever new output
# arrives (tail-like). Default keeps the user anchored to the line they
# were reading.
#   Type:   bool. Default: false.
scroll_on_output = false
# cursor_blink — master cursor-blink toggle.
#   Type:   bool. When false the cursor is drawn steady regardless of
#           the shell's DECSCUSR request.
#   Default: true.
cursor_blink = true
# show_scrollbar — draw the slim right-edge scrollbar when the pane has
# scrollback.
#   Type:   bool. Set to false to hide it entirely.
#   Default: true.
show_scrollbar = true
# tab_silence_ms — silence threshold for the `tab.silence` plugin event.
# After a tab has produced output, it must stay idle for this many
# milliseconds before the edge-triggered event fires once.
#   Type:   u64 milliseconds. 0 disables the event entirely.
#   Default: 5000 (5 s).
tab_silence_ms = 5000
# bell_visual — on-screen flash when a BEL (or `rterm.bell()`) fires.
#   Type:   bool. The `bell` plugin event still fires even when false.
#   Default: true.
bell_visual = true
# bell_urgent — ping the window manager (taskbar urgency / dock badge)
# on BEL when the rterm window is unfocused. Useful for "ping me when
# this build finishes" workflows; set false on desktops where the ping
# is noisy.
#   Type:   bool. Default: true.
bell_urgent = true
# slow_command_ms — threshold for the `pane.slow_command` plugin event
# (and the taskbar urgency ping when unfocused). A shell command framed
# by OSC 133;C … 133;D must run at least this long to fire it. Pair
# with shell-integration for "long task finished" notifications.
#   Type:   u64 milliseconds. 0 disables the feature entirely.
#   Default: 10000 (10 s).
slow_command_ms = 10000
# allow_osc52 — let shells write to the system clipboard via
# `ESC ] 52 ; c ; <base64> ESC \\`. Allowing this silently is a real
# phishing primitive: a shell pipeline can swap your clipboard contents
# between Copy and Paste. xterm, kitty, wezterm, and Alacritty all gate
# this by default.
#   Type:   bool.
#   Default: false. Set true only if you rely on tmux / mosh / SSH
#           clipboard forwarding.
allow_osc52 = false

# ── [appearance] ──────────────────────────────────────────────────────
# Live visual preferences picked by the cycle-theme action /
# `rterm.set_theme(name)` / the settings overlay. Survives restart so
# your last pick re-applies.
[appearance]
# theme — canonical built-in theme name.
#   Type:   string. Run `rterm --list-actions` and look for
#           `cycle_theme` to see all names, or use the settings overlay
#           (default Ctrl+Shift+,). Built-ins: "default", "dark",
#           "dracula", "solarized-dark", "solarized-light", "nord",
#           "gruvbox-dark", "light". Empty `""` = no preference (falls
#           back to `[colors]` overrides if any, otherwise the built-in
#           default palette).
#   Default: "".
theme = ""

# ── [guake] ───────────────────────────────────────────────────────────
# Guake-style drop-down: when `enabled = true`, the `toggle_guake`
# action toggles the window between a "dropped" state (sized per
# `width_pct` × `height_pct` of the current monitor, anchored to
# `position`, raised above other windows) and a minimised state.
# Bind `toggle_guake` to a key in `[[keybindings]]` to use it.
#
# A system-wide global hotkey (so the binding works while the rterm
# window is NOT focused) is not provided by rterm — wire a desktop
# shortcut to a `wmctrl` / `xdotool` / KWin script that targets the
# already-running rterm instance.
#
# Hot-reload: changes to `[guake]` are picked up on `config.toml` save
# without restart (same as font / opacity / bell). Flipping
# `enabled = false` mid-session also drops any AlwaysOnTop level the
# renderer had applied during a prior drop.
[guake]
# enabled — opt-in flag. When false (the default), the first
# `toggle_guake` invocation still runs but the renderer logs a
# one-time `info!` line so users who bound the action via
# `[[keybindings]]` see why nothing else changed. Flip to true to
# silence that message. The layout settings below
# (`position`, `height_pct`, `width_pct`, `global_hotkey`) are
# honoured regardless.
#   Type:   bool.
#   Default: false.
enabled = false
# position — edge the dropped window anchors to.
#   Type:   one of "top" | "bottom" | "full". On Wayland the compositor
#           owns positioning, so "top" / "full" fall back to
#           `set_maximized(true)`; "bottom" warns once and skips.
#   Default: "top".
position = "top"
# height_pct — fraction of the monitor height the dropped window takes.
#   Type:   u8 in 10..=100. Ignored when `position = "full"` (the
#           compositor maximises). Clamped at runtime.
#   Default: 50.
height_pct = 50
# width_pct — fraction of the monitor width.
#   Type:   u8 in 20..=100. Clamped at runtime.
#   Default: 100.
width_pct = 100
# global_hotkey — OS-level shortcut that fires `toggle_guake` even
# when the rterm window is NOT focused. Uses the same key spec
# syntax as `[[keybindings]].keys` (`"F11"`, `"Ctrl+Shift+`"`, ...).
#   Type:   string. Empty `""` = no global hotkey (the in-app
#           `[[keybindings]]` entry still works while rterm is
#           focused). Currently implemented on Windows via
#           `RegisterHotKey`; on Linux / macOS the field is
#           parsed but the worker only logs `warn!` and falls
#           back to the in-app binding (X11 / Wayland / Cocoa
#           backends are TODO).
#   Default: "".
global_hotkey = ""

# ── [paste] ───────────────────────────────────────────────────────────
# Bulk-paste safety prompt. A multi-line clipboard payload pasted into
# a shell at a prompt can auto-submit each line as a command — that's
# accidentally happened to most terminal users at least once
# (e.g. drag-paste of a hostname list ends up running each hostname
# as a command). When enabled, multi-line pastes ≥ `confirm_min_bytes`
# show a modal: Paste, Edit (mini-editor for the buffer), Cancel.
[paste]
# confirm_multiline — master toggle.
#   Type:   bool. `false` skips the modal entirely (legacy behaviour).
#   Default: true.
confirm_multiline = true
# confirm_min_bytes — short pastes skip the modal even when multi-
# line, because a 2-line `cd && ls` chain is usually intentional.
#   Type:   u32. Counted in bytes (not chars / not lines).
#   Default: 80.
confirm_min_bytes = 80

# ── [image] ───────────────────────────────────────────────────────────
# Inline-image protocols (iTerm2 OSC 1337 ;File= and Kitty APC G).
# When `enabled = false`, both parsers drop new payloads silently —
# already-displayed images stay in place so the toggle gates input,
# not live state. Set to `false` on low-bandwidth SSH sessions or
# when a misbehaving app floods malformed payloads.
[image]
# enabled — accept inline-image payloads from shell apps like
# `chafa`, `kitty +kitten icat`, `yazi` preview, matplotlib's iTerm2
# backend, etc.
#   Type:   bool. Default: true.
enabled = true
# auto_detect — sniff raw PNG / JPEG magic bytes in the input
# stream (at newline boundaries) and decode them as inline images.
# Lets `cat picture.png` "just work" without a helper utility.
# Disabled by default — `xxd image.png` / `nc < image.png` /
# hex-dump utilities all stream the same magic bytes intentionally
# and would surprise-render as pictures. Toggle anytime via the
# Settings overlay (Ctrl+Shift+, → "Auto-detect inline images").
#
# `cat picture.png` "just works" — the parser sniffs PTY ONLCR
# in the PNG header (double-`\r` before `\n` is the calling card)
# and applies the matching `\r\n → \n` undo to the body. Raw
# streams (`stty -opost; cat picture.png`) are detected as
# non-ONLCR and the body bytes pass through untouched, so the
# normalization is safe in both modes. JPEG falls back to
# ONLCR-undo unconditionally because its 3-byte magic doesn't
# include a `\n` to sniff from — fine for the `cat` path that
# dominates auto-detect use.
#
#   Type:   bool. Default: false.
auto_detect = false

# ── [colors] ──────────────────────────────────────────────────────────
# Terminal palette overrides. Every entry is an optional `[r, g, b]`
# byte triple (each channel 0..=255); missing fields keep the built-in
# xterm-ish defaults. Live-reloaded on save.
[colors]
# fg / bg — default foreground / background for `Color::Default` cells.
# fg      = [220, 220, 220]
# bg      = [10, 12, 18]
# cursor — fixed cursor block colour. When unset the cursor uses the
# inverted cell foreground (xterm convention).
# cursor  = [255, 204, 102]

# Named 16-colour palette (8 normal + 8 bright).
# black   = [0, 0, 0]
# red     = [205, 49, 49]
# green   = [13, 188, 121]
# yellow  = [229, 229, 16]
# blue    = [36, 114, 200]
# magenta = [188, 63, 188]
# cyan    = [17, 168, 205]
# white   = [229, 229, 229]
# bright_black   = [102, 102, 102]
# bright_red     = [241, 76, 76]
# bright_green   = [35, 209, 139]
# bright_yellow  = [245, 245, 67]
# bright_blue    = [59, 142, 234]
# bright_magenta = [214, 112, 214]
# bright_cyan    = [41, 184, 219]
# bright_white   = [255, 255, 255]

# ── [[keybindings]] ───────────────────────────────────────────────────
# Custom keybindings. Each entry overrides any built-in default for the
# same key combo; press `Ctrl+Shift+H` in-app to see the full live list.
#
# Each entry is `{ keys, action }`:
#
# Modifiers (combined with `+`):  Ctrl (or Control), Shift, Alt (or
#                                 Option), Super (or Cmd, Meta, Win).
# Named keys:                     Enter (Return), Escape (Esc), Tab,
#                                 Space, Backspace, Delete (Del),
#                                 Insert (Ins), Home, End, PageUp
#                                 (PgUp), PageDown (PgDn),
#                                 Up/Down/Left/Right (ArrowUp/Down/
#                                 Left/Right), F1..F12.
# Punctuation aliases:            Plus (+), Minus/Dash (-), Equal (=),
#                                 Comma (,), Period/Dot (.), Slash (/),
#                                 Backslash (\\), Semicolon (;),
#                                 Colon (:), Apostrophe/Quote (').
#
# Actions (run `rterm --list-actions` for the live canonical list):
#   new_tab, close_tab, next_tab, prev_tab, move_tab_left, move_tab_right,
#   split_horizontal, split_vertical, split_auto, close_pane,
#   goto_first_tab, goto_last_tab,
#   focus_next_pane, focus_prev_pane, focus_first_pane, focus_last_pane,
#   paste, copy, clear_selection, search,
#   jump_prev_prompt, jump_next_prompt, jump_prev_command,
#   jump_next_command, scroll_page_up, scroll_page_down,
#   scroll_half_page_up, scroll_half_page_down,
#   scroll_line_up, scroll_line_down, scroll_home,
#   scroll_end, clear_scrollback, resize_pane_left, resize_pane_right,
#   resize_pane_up, resize_pane_down,
#   toggle_help, open_palette, save_scrollback, zoom_pane, balance_panes,
#   quit, font_increase, font_decrease, font_reset, opacity_increase,
#   opacity_decrease, opacity_reset, toggle_last_tab, copy_hovered_url,
#   reset_pane, swap_pane_next, swap_pane_prev, toggle_bell_mute,
#   toggle_broadcast,
#   open_hovered_url, cycle_theme, cycle_theme_prev, open_settings,
#   rename_tab, snap_window_left, snap_window_right, snap_window_top,
#   snap_window_bottom, maximize_toggle, minimize_window,
#   restore_window, toggle_guake.

# [[keybindings]]
# keys   = "Ctrl+T"
# action = "new_tab"

# [[keybindings]]
# keys   = "F2"
# action = "search"

# --- Syntax highlighting -----------------------------------------------------
# WindTerm-style client-side highlighting of terminal output. Matched text is
# recoloured, but ONLY where the program left the default foreground — so it
# enhances plain logs / command output and never fights `ls --color`, `bat`,
# `git`, or a full-screen TUI.
[highlight]
# enabled  = true    # master switch
# builtins = true    # ship the default rules (URLs, IPv4, UUID, hex,
#                    # ERROR/WARN/INFO, quoted strings, numbers). Set false to
#                    # start clean and define everything below.

# Custom rules run BEFORE the built-ins (first match on a character wins), so a
# rule here overrides a built-in on the same text. `fg` accepts #RRGGBB, #RGB,
# or a colour name (red green yellow orange blue magenta cyan white gray).
# [[highlight.rules]]
# pattern = "\\bTODO\\b"
# fg      = "orange"
# bold    = true

# [[highlight.rules]]
# pattern = "\\b[A-Z]{2,}_[A-Z_]+\\b"   # SCREAMING_SNAKE constants
# fg      = "magenta"
